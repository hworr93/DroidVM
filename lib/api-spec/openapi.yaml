openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Virtual PC VM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vms
    description: Virtual machine operations
  - name: disks
    description: Virtual disk operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vms:
    get:
      operationId: listVMs
      tags: [vms]
      summary: List all virtual machines
      responses:
        "200":
          description: List of VMs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VM"
    post:
      operationId: createVM
      tags: [vms]
      summary: Create a new virtual machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVMRequest"
      responses:
        "201":
          description: VM created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VM"

  /vms/{id}:
    get:
      operationId: getVM
      tags: [vms]
      summary: Get a virtual machine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: VM details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VM"
        "404":
          description: VM not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateVM
      tags: [vms]
      summary: Update a virtual machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVMRequest"
      responses:
        "200":
          description: VM updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VM"
    delete:
      operationId: deleteVM
      tags: [vms]
      summary: Delete a virtual machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: VM deleted

  /vms/{id}/start:
    post:
      operationId: startVM
      tags: [vms]
      summary: Start a virtual machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: VM started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMStatusResponse"

  /vms/{id}/stop:
    post:
      operationId: stopVM
      tags: [vms]
      summary: Stop a virtual machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: VM stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMStatusResponse"

  /disks:
    get:
      operationId: listDisks
      tags: [disks]
      summary: List all virtual disks
      responses:
        "200":
          description: List of disks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VirtualDisk"
    post:
      operationId: createDisk
      tags: [disks]
      summary: Create a new virtual disk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiskRequest"
      responses:
        "201":
          description: Disk created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualDisk"

  /disks/{id}:
    delete:
      operationId: deleteDisk
      tags: [disks]
      summary: Delete a virtual disk
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Disk deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    VM:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ramMb:
          type: integer
        cpuCores:
          type: integer
        architecture:
          type: string
          enum: [arm, arm64, x86, x86_64, i386, powerpc]
        machineType:
          type: string
          enum: [q35, pc, virt, isapc]
        firmware:
          type: string
          enum: [bios, uefi]
        enableMtcg:
          type: boolean
        enableKvm:
          type: boolean
        disableTsc:
          type: boolean
        isoPath:
          type: string
          nullable: true
        diskId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [stopped, running, starting, error]
        createdAt:
          type: string
      required:
        - id
        - name
        - ramMb
        - cpuCores
        - architecture
        - machineType
        - firmware
        - enableMtcg
        - enableKvm
        - disableTsc
        - status
        - createdAt

    CreateVMRequest:
      type: object
      properties:
        name:
          type: string
        ramMb:
          type: integer
        cpuCores:
          type: integer
        architecture:
          type: string
          enum: [arm, arm64, x86, x86_64, i386, powerpc]
        machineType:
          type: string
          enum: [q35, pc, virt, isapc]
        firmware:
          type: string
          enum: [bios, uefi]
        enableMtcg:
          type: boolean
        enableKvm:
          type: boolean
        disableTsc:
          type: boolean
        isoPath:
          type: string
          nullable: true
        diskId:
          type: integer
          nullable: true
      required:
        - name
        - ramMb
        - cpuCores
        - architecture
        - machineType
        - firmware
        - enableMtcg
        - enableKvm
        - disableTsc

    VMStatusResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [stopped, running, starting, error]
        message:
          type: string
      required:
        - id
        - status
        - message

    VirtualDisk:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sizeMb:
          type: integer
        format:
          type: string
          enum: [qcow2, raw, vmdk, vdi]
        path:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - sizeMb
        - format
        - path
        - createdAt

    CreateDiskRequest:
      type: object
      properties:
        name:
          type: string
        sizeMb:
          type: integer
        format:
          type: string
          enum: [qcow2, raw, vmdk, vdi]
      required:
        - name
        - sizeMb
        - format
