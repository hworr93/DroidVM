kind = "web"
previewPath = "/"
title = "Virtual PC VM"
version = "1.0.0"
id = "artifacts/virtual-pc-vm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26037
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/virtual-pc-vm run dev"

[services.env]
PORT = "26037"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/virtual-pc-vm", "run", "build"]
publicDir = "artifacts/virtual-pc-vm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
